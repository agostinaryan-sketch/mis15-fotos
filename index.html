<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mis 15 Mía</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:wght@400;600&family=Montserrat:wght@300;400&display=swap');

body{
margin:0;
padding:30px 20px;
background:#050505;
color:white;
text-align:center;
font-family:Montserrat,sans-serif;
}

.contenedor{
max-width:1000px;
margin:auto;
}

.mis15{
font-family:'Cormorant Garamond',serif;
font-size:60px;
letter-spacing:8px;
}

.numero{
font-size:150px;
font-family:'Cormorant Garamond',serif;
background:linear-gradient(#fff,#888,#fff);
-webkit-background-clip:text;
color:transparent;
}

.nombre{
font-family:'Great Vibes',cursive;
font-size:90px;
}

.titulo{
margin-top:50px;
font-size:45px;
letter-spacing:6px;
}

.texto{
margin:20px;
letter-spacing:4px;
color:#ccc;
}

input,button{
padding:15px;
margin:10px;
border-radius:30px;
}

button{
background:black;
color:white;
border:1px solid white;
padding:15px 40px;
cursor:pointer;
}

#galeria{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:20px;
margin-top:40px;
}

#galeria img{
width:100%;
border-radius:20px;
}
</style>

</head>

<body>

<div class="contenedor">

<div class="mis15">
MIS 15
</div>

<div class="numero">
15
</div>

<div class="nombre">
Mía
</div>

<div class="titulo">
TUS FOTOS
</div>

<div class="texto">
COMPARTÍ LA FIESTA EN VIVO
</div>

<input type="file" id="archivo" accept="image/*">

<br>

<button onclick="subirFoto()">
SUBIR FOTO
</button>

<div id="galeria"></div>

</div>


<script>

const SUPABASE_URL =
"https://xjztgmuhvfswumenahcy.supabase.co";


const SUPABASE_KEY =
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhqenRnbXVodmZzd3VtZW5haGN5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ2Mjk1MDksImV4cCI6MjEwMDIwNTUwOX0.Uw8YZQgenClMn8crmDTiY7Gh3GicQ96SRNgZEH3pNyY";


const clienteSupabase =
window.supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
);



async function subirFoto(){

const archivo =
document.getElementById("archivo").files[0];


if(!archivo){
alert("Elegí una foto primero");
return;
}


const nombre =
Date.now()+"-"+archivo.name;


const {error}=await clienteSupabase.storage
.from("Fotos-evento")
.upload(nombre,archivo);


if(error){
alert(error.message);
return;
}


const url =
SUPABASE_URL+
"/storage/v1/object/public/Fotos-evento/"+
nombre;


await clienteSupabase
.from("fotos")
.insert({
url:url
});


alert("Foto subida correctamente");


mostrarFotos();

}



async function mostrarFotos(){

const {data,error}=await clienteSupabase
.from("fotos")
.select("*")
.order("created_at",{ascending:false});


if(error){
console.log(error);
return;
}


const galeria =
document.getElementById("galeria");


galeria.innerHTML="";


data.forEach(foto=>{

galeria.innerHTML +=
`
<img src="${foto.url}">
`;

});

}


mostrarFotos();


</script>

</body>
</html>
