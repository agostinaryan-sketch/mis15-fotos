<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mis 15 Mía</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

@import url('https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:wght@400;600&family=Montserrat:wght@300;400&display=swap');

*{
box-sizing:border-box;
}

body{

margin:0;
padding:30px 20px;
min-height:100vh;

background:
radial-gradient(circle at top,#252525 0%,#090909 45%,#000 100%);

color:white;
text-align:center;

font-family:'Montserrat',sans-serif;

}


body:before{

content:"";

position:fixed;
inset:0;

background-image:
radial-gradient(#ffffff 1px,transparent 1px);

background-size:70px 70px;

opacity:.10;

pointer-events:none;

}


.contenedor{

max-width:1100px;
margin:auto;
position:relative;
z-index:2;

}


.mis15{

font-family:'Cormorant Garamond',serif;

font-size:65px;

letter-spacing:10px;

margin-top:20px;

}


.numero{

font-family:'Cormorant Garamond',serif;

font-size:150px;

font-weight:600;

line-height:.8;

margin-top:20px;


background:linear-gradient(
180deg,
#ffffff,
#999999,
#ffffff,
#555555
);

-webkit-background-clip:text;

color:transparent;

text-shadow:
0 0 20px rgba(255,255,255,.4);

}


.nombre{

font-family:'Great Vibes',cursive;

font-size:95px;

margin-top:20px;

text-shadow:
0 0 15px #aaa;

}


.titulo{

margin-top:70px;

font-family:'Cormorant Garamond',serif;

font-size:45px;

letter-spacing:8px;

}


.texto{

margin-top:20px;

color:#ccc;

font-size:14px;

letter-spacing:5px;

}


input{

margin-top:40px;

padding:12px;

border-radius:30px;

background:white;

}


button{

margin-top:10px;

padding:15px 40px;

border-radius:30px;

border:1px solid white;

background:#000;

color:white;

letter-spacing:3px;

cursor:pointer;

}


button:hover{

background:white;

color:black;

}


#galeria{

margin-top:60px;

display:grid;

grid-template-columns:repeat(auto-fit,minmax(240px,1fr));

gap:20px;

}


#galeria img{

width:100%;

border-radius:20px;

box-shadow:
0 0 25px rgba(255,255,255,.25);

animation:entrada .8s;

}


@keyframes entrada{

from{

opacity:0;
transform:translateY(20px);

}

to{

opacity:1;

}

}

</style>

</head>


<body>


<div class="contenedor">


<div class="mis15">
MIS 15
</div>


<div class="numero">
15
</div>


<div class="nombre">
Mía
</div>


<div class="titulo">
TUS FOTOS
</div>


<div class="texto">
COMPARTÍ LA FIESTA EN VIVO
</div>


<input 
type="file"
id="archivo"
accept="image/*">


<br>


<button onclick="subirFoto()">
SUBIR FOTO
</button>


<div id="galeria"></div>


</div>



<script>


const SUPABASE_URL =
"https://xjztgmuhvfswumenahcy.supabase.co";


const SUPABASE_KEY =
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhqenRnbXVodmZzd3VtZW5haGN5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ2Mjk1MDksImV4cCI6MjEwMDIwNTUwOX0.Uw8YZQgenClMn8crmDTiY7Gh3GicQ96SRNgZEH3pNyY";


const supabase =
window.supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
);



async function subirFoto(){


const archivo =
document.getElementById("archivo").files[0];


if(!archivo){

alert("Elegí una foto primero");

return;

}


const nombre =
Date.now()+"-"+archivo.name;



const {error}=await supabase.storage

.from("Fotos-evento")

.upload(nombre,archivo);



if(error){

alert(error.message);

return;

}



const url =

SUPABASE_URL +

"/storage/v1/object/public/Fotos-evento/" +

nombre;



await supabase

.from("fotos")

.insert({

url:url

});



alert("Foto subida correctamente");


mostrarFotos();


}



async function mostrarFotos(){


const {data,error}=await supabase

.from("fotos")

.select("*")

.order("created_at",
{ascending:false});



if(error){

console.log(error);

return;

}



const galeria =
document.getElementById("galeria");


galeria.innerHTML="";



data.forEach(foto=>{


galeria.innerHTML +=

`

<img src="${foto.url}">

`;

});


}



mostrarFotos();


</script>


</body>
