<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mis 15 Mía</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

@import url('https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:wght@300;400;500;600&family=Montserrat:wght@300;400;500&display=swap');

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html{
scroll-behavior:smooth;
}

body{

font-family:'Montserrat',sans-serif;

background:#ffffff;

color:#333;

overflow-x:hidden;

}



/**********************
PORTADA
**********************/

.hero{

position:relative;

height:100vh;

min-height:760px;

background-image:url("images/DSC01151.jpg");

background-size:cover;

background-position:center;

display:flex;

align-items:center;

justify-content:center;

text-align:center;

overflow:hidden;

}



.hero::before{

content:"";

position:absolute;

inset:0;

background:

linear-gradient(

180deg,

rgba(0,0,0,.25),

rgba(0,0,0,.20),

rgba(0,0,0,.15),

rgba(255,255,255,0)

);

}



.hero::after{

content:"";

position:absolute;

left:0;

right:0;

bottom:0;

height:45%;

background:

linear-gradient(

to bottom,

rgba(255,255,255,0),

rgba(255,255,255,.08),

rgba(255,255,255,.18),

rgba(255,255,255,.35),

rgba(255,255,255,.60),

rgba(255,255,255,.82),

#ffffff

);

}



.heroContenido{

position:relative;

z-index:2;

color:white;

padding:20px;

}



.subtitulo{

font-family:'Cormorant Garamond',serif;

letter-spacing:10px;

font-size:28px;

font-weight:400;

margin-bottom:15px;

text-transform:uppercase;

}



.nombre{

font-family:'Great Vibes',cursive;

font-size:120px;

font-weight:400;

line-height:1;

text-shadow:

0 10px 35px rgba(0,0,0,.35);

}



.fecha{

margin-top:25px;

font-size:14px;

letter-spacing:6px;

text-transform:uppercase;

opacity:.95;

}



.bajar{

position:absolute;

bottom:45px;

left:50%;

transform:translateX(-50%);

z-index:3;

font-size:13px;

letter-spacing:4px;

color:white;

opacity:.9;

animation:subirBajar 2s infinite;

}



@keyframes subirBajar{

0%{

transform:translate(-50%,0);

}

50%{

transform:translate(-50%,10px);

}

100%{

transform:translate(-50%,0);

}

}



/**********************
CONTENIDO
**********************/

.contenedor{

max-width:1200px;

margin:auto;

padding:80px 25px;

}



.titulo{

font-family:'Cormorant Garamond',serif;

font-size:54px;

font-weight:500;

letter-spacing:8px;

text-align:center;

color:#222;

}



.descripcion{

max-width:700px;

margin:25px auto 55px;

text-align:center;

line-height:1.8;

font-size:16px;

color:#666;

}



.subida{

display:flex;

flex-direction:column;

align-items:center;

gap:20px;

margin-bottom:70px;

}



input[type=file]{

background:#fff;

border:2px dashed #dadada;

padding:18px;

width:100%;

max-width:430px;

border-radius:18px;

cursor:pointer;

font-size:15px;

}



button{

padding:17px 42px;

border:none;

border-radius:999px;

background:#222;

color:white;

font-size:14px;

letter-spacing:3px;

cursor:pointer;

transition:.35s;

box-shadow:

0 10px 30px rgba(0,0,0,.15);

}



button:hover{

transform:translateY(-3px);

box-shadow:

0 18px 40px rgba(0,0,0,.18);

}



#galeria{

display:grid;

grid-template-columns:

repeat(auto-fit,minmax(260px,1fr));

gap:26px;

}
#galeria img{

width:100%;

display:block;

border-radius:22px;

background:white;

box-shadow:

0 20px 45px rgba(0,0,0,.10);

transition:.35s;

}

#galeria img:hover{

transform:translateY(-6px);

box-shadow:

0 28px 55px rgba(0,0,0,.16);

}



footer{

padding:70px 20px;

text-align:center;

font-size:13px;

letter-spacing:3px;

color:#999;

}



@media(max-width:768px){

.hero{

min-height:100vh;

}

.subtitulo{

font-size:20px;

letter-spacing:6px;

}

.nombre{

font-size:82px;

}

.fecha{

letter-spacing:4px;

font-size:12px;

}

.titulo{

font-size:40px;

letter-spacing:5px;

}

.descripcion{

font-size:15px;

padding:0 10px;

}

.contenedor{

padding:60px 20px;

}

}

</style>

</head>

<body>

<section class="hero">

<div class="heroContenido">

<div class="subtitulo">

MIS 15

</div>

<div class="nombre">

Mía

</div>

<div class="fecha">

COMPARTÍ LOS RECUERDOS MÁS LINDOS DE ESTA NOCHE

</div>

</div>

<div class="bajar">

DESLIZÁ ↓

</div>

</section>

<div class="contenedor">

<h2 class="titulo">

ÁLBUM DE LA FIESTA

</h2>

<p class="descripcion">

Subí tus fotos y compartí este momento con todos.
Cada imagen aparecerá automáticamente en la galería para revivir juntos esta noche inolvidable.

</p>

<div class="subida">

<input
type="file"
id="archivo"
accept="image/*">

<button onclick="subirFoto()">

async function subirFoto(){

    const archivo = document.getElementById("archivo").files[0];

    if(!archivo){
        alert("Elegí una foto primero");
        return;
    }

    const nombre = Date.now() + "-" + archivo.name;

    const { data, error } = await clienteSupabase.storage
        .from("Fotos-evento")
        .upload(nombre, archivo);

    console.log("UPLOAD DATA:", data);
    console.log("UPLOAD ERROR:", error);

    if(error){
        alert(error.message);
        return;
    }

    const { data: publicData } = clienteSupabase.storage
        .from("Fotos-evento")
        .getPublicUrl(nombre);

    console.log("PUBLIC URL:", publicData.publicUrl);

    const { error: insertError } = await clienteSupabase
        .from("fotos")
        .insert({
            url: publicData.publicUrl
        });

    console.log("INSERT ERROR:", insertError);

    if(insertError){
        alert(insertError.message);
        return;
    }

    alert("Foto subida correctamente");

    mostrarFotos();
}

}

async function mostrarFotos(){

const {data,error}=await clienteSupabase

.from("fotos")

.select("*")

.order("created_at",{ascending:false});

if(error){

console.log(error);

return;

}

const galeria =
document.getElementById("galeria");

galeria.innerHTML="";

data.forEach(foto=>{

galeria.innerHTML+=`

<img src="${foto.url}" loading="lazy">

`;

});

}

mostrarFotos();

</script>

</body>

</html>
